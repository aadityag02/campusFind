<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFind — Verify Email</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Campus<span>Find</span></div>
    <div class="auth-sub" id="subText">Enter the 6-digit code sent to your email</div>

    <div class="alert alert-error" id="alert"></div>

    <div class="form-group">
      <label>Verification Code</label>
      <input type="text" id="otp" placeholder="123456" maxlength="6"
        style="font-size: 28px; letter-spacing: 12px; text-align: center; font-weight: 600;">
    </div>

    <button class="btn btn-primary" onclick="verify()" id="verifyBtn">
      <span id="verifyText">Verify & Continue</span>
      <div class="spinner" id="verifySpinner"></div>
    </button>

    <p class="text-muted text-center mt-16">
      <a href="/register" style="color: var(--accent)">← Go back</a>
    </p>
  </div>
</div>

<script>
  const email = localStorage.getItem('pendingEmail');
  if (email) {
    document.getElementById('subText').textContent = `Code sent to ${email}`;
  }

  async function verify() {
    const otp = document.getElementById('otp').value.trim();
    const spinner = document.getElementById('verifySpinner');
    const text = document.getElementById('verifyText');

    if (!otp || otp.length !== 6) return showAlert('Enter the 6-digit code.');

    spinner.style.display = 'block'; text.style.display = 'none';

    const res = await fetch('/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });
    const data = await res.json();

    spinner.style.display = 'none'; text.style.display = 'block';

    if (data.success) {
      localStorage.removeItem('pendingEmail');
      window.location.href = '/dashboard';
    } else {
      showAlert(data.message);
    }
  }

  function showAlert(msg) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('otp').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g, '');
    if (e.target.value.length === 6) verify();
  });
</script>
</body>
</html>
