<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFind — Browse Items</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-logo">Campus<span>Find</span></a>
  <div class="nav-links">
    <a href="/dashboard">Home</a>
    <a href="/report">Report Item</a>
    <a href="/browse" class="active">Browse</a>
    <a href="/match">Image Match</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="nav-user" id="navUser"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="container-wide">
  <div class="page-header">
    <h1>Browse Reports</h1>
    <p>Search through all lost and found reports on campus</p>
  </div>

  <!-- Filters -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:32px">
    <div class="grid-2" style="gap:12px;align-items:end">
      <div class="form-group" style="margin-bottom:0">
        <label>Search</label>
        <input type="text" id="search" placeholder="Search by name, location, keyword..." oninput="debounceLoad()">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin-bottom:0">
          <label>Category</label>
          <select id="filterCat" onchange="loadItems()">
            <option value="">All categories</option>
            <option value="Electronics">Electronics</option>
            <option value="ID & Cards">ID & Cards</option>
            <option value="Bags & Accessories">Bags & Accessories</option>
            <option value="Clothing">Clothing</option>
            <option value="Stationery">Stationery</option>
            <option value="Keys">Keys</option>
            <option value="Water Bottle">Water Bottle</option>
            <option value="Wallet & Money">Wallet & Money</option>
            <option value="Sports Equipment">Sports Equipment</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Type</label>
          <select id="filterType" onchange="loadItems()">
            <option value="">Lost & Found</option>
            <option value="lost">Lost only</option>
            <option value="found">Found only</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Results count -->
  <div style="margin-bottom:16px;color:var(--muted);font-size:14px" id="resultCount"></div>

  <!-- Items grid -->
  <div class="grid-3" id="itemsGrid">
    <div class="text-muted" style="grid-column:1/-1;padding:40px 0;text-align:center">Loading items...</div>
  </div>
</div>

<script>
  let debounceTimer;

  async function init() {
    const me = await fetch('/auth/me').then(r => r.json());
    if (!me.loggedIn) return window.location.href = '/';
    document.getElementById('navUser').textContent = me.name;
    loadItems();
  }

  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadItems, 400);
  }

  async function loadItems() {
    const search = document.getElementById('search').value.trim();
    const category = document.getElementById('filterCat').value;
    const type = document.getElementById('filterType').value;

    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (category) params.set('category', category);
    if (type) params.set('type', type);

    const data = await fetch('/items/browse?' + params).then(r => r.json());
    const grid = document.getElementById('itemsGrid');
    const count = document.getElementById('resultCount');

    if (!data.items || data.items.length === 0) {
      grid.innerHTML = `<div class="text-muted" style="grid-column:1/-1;padding:60px 0;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">🔎</div>
        <div>No items found matching your search.</div>
        <a href="/report" class="btn btn-primary" style="margin-top:16px;width:fit-content">Report an Item</a>
      </div>`;
      count.textContent = '';
      return;
    }

    count.textContent = `${data.items.length} item${data.items.length !== 1 ? 's' : ''} found`;
    grid.innerHTML = data.items.map(renderCard).join('');
  }

  function renderCard(item) {
    const badgeClass = `badge-${item.type}`;
    const badgeText = item.type.charAt(0).toUpperCase() + item.type.slice(1);
    const timeAgo = getTimeAgo(item.created_at * 1000);
    return `
      <div class="card">
        ${item.image_path
          ? `<img src="${item.image_path}" class="item-img" alt="${item.title}">`
          : `<div class="item-img" style="display:flex;align-items:center;justify-content:center;font-size:44px;background:var(--surface2)">${item.type === 'lost' ? '🔍' : '📦'}</div>`}
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <span class="text-muted" style="font-size:12px">${timeAgo}</span>
        </div>
        <div class="item-title">${item.title}</div>
        <div class="item-meta">📁 ${item.category}</div>
        <div class="item-meta">📍 ${item.location}</div>
        <div class="item-meta">📅 ${item.date_occurred}</div>
        ${item.description ? `<div class="text-muted" style="font-size:13px;margin-top:8px;line-height:1.5">${item.description.slice(0,100)}${item.description.length > 100 ? '…' : ''}</div>` : ''}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
          Reported by ${item.reporter_name}
        </div>
      </div>`;
  }

  function getTimeAgo(ms) {
    const diff = Date.now() - ms;
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }

  init();
</script>
</body>
</html>
