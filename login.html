<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFind — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Campus<span>Find</span></div>
    <div class="auth-sub">IIT Ropar Lost & Found Platform</div>

    <div class="alert alert-error" id="alert"></div>

    <div class="form-group">
      <label>Institute Email</label>
      <input type="email" id="email" placeholder="yourname@iitrpr.ac.in" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" onclick="login()" id="loginBtn">
      <span id="loginText">Sign In</span>
      <div class="spinner" id="loginSpinner"></div>
    </button>

    <p class="text-muted text-center mt-16">
      No account? <a href="/register" style="color: var(--accent)">Create one</a>
    </p>
  </div>
</div>

<script>
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const alert = document.getElementById('alert');
    const spinner = document.getElementById('loginSpinner');
    const text = document.getElementById('loginText');

    if (!email || !password) return showAlert('Please fill all fields.');

    spinner.style.display = 'block'; text.style.display = 'none';

    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    spinner.style.display = 'none'; text.style.display = 'block';

    if (data.success) {
      window.location.href = '/dashboard';
    } else {
      showAlert(data.message);
    }
  }

  function showAlert(msg) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.style.display = 'block';
    el.className = 'alert alert-error';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
